version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: femabank-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "FEMABank@2024!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'FEMABank@2024!' -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - femabank-network

  femabank-api:
    build:
      context: .
      dockerfile: src/FEMABank.Api/Dockerfile
    container_name: femabank-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=mssql,1433;Database=FEMABank;User Id=sa;Password=FEMABank@2024!;TrustServerCertificate=true
    ports:
      - "8080:8080"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - femabank-network

volumes:
  mssql-data:

networks:
  femabank-network:
    driver: bridge